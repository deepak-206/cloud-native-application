name: Build and Push Docker Image

on:
  push:
    branches:
      - main   # Trigger workflow on push to 'main'
  pull_request:
    branches:
      - main   # Trigger workflow on PRs targeting 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 3: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build the Docker image
      - name: Build Docker image
        run: |
          docker build -t deepakprasadgupta/cloud-native-application:${{ github.sha }} .

      # Step 5: Smoke test - verify the application serves content correctly
      - name: Smoke test Docker image
        run: |
          docker run -d -p 8080:80 --name smoke-test deepakprasadgupta/cloud-native-application:${{ github.sha }}
          trap 'docker stop smoke-test; docker rm smoke-test' EXIT
          for i in $(seq 1 10); do
            curl --silent --fail http://localhost:8080 | grep -q "Welcome to My Web App" && echo "Smoke test passed" && exit 0
            sleep 2
          done
          echo "Smoke test failed: application did not respond as expected" && exit 1

      # Step 6: Push the Docker image (only on main branch)
      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push deepakprasadgupta/cloud-native-application:${{ github.sha }}
