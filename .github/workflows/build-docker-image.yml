name: Build and Push Docker Image

on:
  push:
    branches:
      - main   # Trigger workflow on push to 'main'
  pull_request:
    branches:
      - main   # Trigger workflow on PRs targeting 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 3: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build the Docker image
      - name: Build Docker image
        run: |
          docker build -t deepak-206/cloud-native-application:${{ github.sha }} .

      # Step 5: Push the Docker image (only on main branch)
      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push deepak-206/cloud-native-application:${{ github.sha }}
